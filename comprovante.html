<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- ============================================================
         CONFIGURAÇÕES BÁSICAS DA PÁGINA
    ============================================================ -->

    <!-- Define o conjunto de caracteres (UTF-8)
         Permite usar acentos corretamente (á, é, ç, etc.) -->
    <meta charset="UTF-8">

    <!-- Informação sobre o autor da página -->
    <meta name="author" content="Wanderley Lopes Batista">    

    <!-- Torna a página responsiva
         Faz com que ela se adapte a celulares e tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">     

    <!-- Importa o arquivo CSS externo
         Responsável por toda a estilização da página -->
    <link rel="stylesheet" href="css/estilo_petshop.css">

    <!-- Título exibido na aba do navegador -->
    <title>Comprovante do Pet</title>
</head>

<body>

    <!-- ============================================================
         ÁREA DE EXIBIÇÃO DOS DADOS
    ============================================================ -->

    <!-- 
        Esta DIV começa vazia.
        O JavaScript irá inserir conteúdo dentro dela dinamicamente.
        Isso é chamado de "conteúdo dinâmico".
    -->
    <div id="resultado"></div>

    <script>
        // ============================================================
        // 1. RECUPERANDO DADOS DO localStorage
        // ============================================================
        // localStorage é uma "memória do navegador".
        // Ele guarda informações mesmo após atualizar a página.
        //
        // getItem("chave") → busca um valor salvo anteriormente.
        //
        // O operador || funciona como um "plano B":
        // Se não existir valor (null), mostra um texto padrão.

        let nomePet = localStorage.getItem("nomePet") || "Não informado";
        // Recupera o nome do pet

        let especiePet = localStorage.getItem("especiePet") || "Não informado";
        // Recupera a espécie do pet

        let sexoPet = localStorage.getItem("sexoPet") || "Não informado";
        // Recupera o sexo do pet

        let listaServicos = localStorage.getItem("listaServicos") || "Nenhum";
        // Recupera os serviços escolhidos

        // ============================================================
        // 2. SELECIONANDO O ELEMENTO HTML
        // ============================================================
        // getElementById → busca um elemento pelo ID

        let areaResultado = document.getElementById("resultado");
        // Aqui estamos "pegando" a DIV onde o conteúdo será exibido

        // ============================================================
        // 3. INSERINDO HTML DINÂMICO NA PÁGINA
        // ============================================================
        // innerHTML permite colocar HTML dentro de um elemento
        //
        // Usamos crases (` `) → template string
        // Isso permite usar variáveis com ${variavel}

        areaResultado.innerHTML = `
            
            <!-- Caixa principal do comprovante -->
            <div class="comprovante">

                <!-- Título do comprovante -->
                <h3 class="titulo-comprovante">
                    DADOS DO PET CADASTRADO
                </h3>

                <!-- Linha separadora -->
                <hr>

                <!-- Exibição dos dados recuperados -->
                <p><strong>Nome:</strong> ${nomePet}</p>
                <p><strong>Espécie:</strong> ${especiePet}</p>
                <p><strong>Sexo:</strong> ${sexoPet}</p>
                <p><strong>Serviços:</strong> ${listaServicos}</p>

                <!-- 
                    Botão de impressão
                    window.print() abre a tela de impressão do navegador
                -->
                <button onclick="window.print()" class="botao-imprimir">
                    Imprimir Comprovante
                </button>

            </div>
        `;

        // ============================================================
        // 4. OBSERVAÇÃO IMPORTANTE PARA OS ALUNOS
        // ============================================================
        // Se aparecer "Não informado":
        // - Os dados não foram salvos no localStorage
        // - Ou o nome das chaves está diferente
        //
        // Dica: testar no console com F12 → localStorage
    </script>

</body>
</html>
