  <title>Pet Shop - Sistema Principal</title>
  
  <style>
    
body {                 /* Seletor que seleciona a tag <body> */
  margin: 0;                /* Remove a margem padrão do navegador */
  padding: 0;               /* Remove o espaçamento interno padrão */
  height: 100%;             /* Faz o body/html ocuparem 100% da altura da tela */
  overflow: hidden;         /* Esconde qualquer conteúdo que ultrapasse a tela */
}

/* Estilo do iframe (área onde outra página é exibida) */
iframe {                    /* Seletor que seleciona a tag <iframe> */
  width: 100%;              /* O iframe ocupa 100% da largura da tela */
  height: 100vh;            /* O iframe ocupa 100% da altura visível da tela */
  border: none;             /* Remove a borda padrão do iframe */
}

  </style>
</head>
<body>

  <iframe>
    name="principal" src="conteudo.html"
   
  </iframe>



</body>
</html>
